<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Training Week</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --border: #222222;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 60px 0 40px;
    text-align: center;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 12vw, 100px);
    line-height: 0.9;
    letter-spacing: 0.02em;
  }

  h1 span { color: var(--accent); }

  .header-sub {
    margin-top: 16px;
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin: 50px 0 60px;
  }

  @media (max-width: 640px) {
    .days-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .day-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }

  .day-btn:hover:not(.rest-day) { border-color: #444; background: #1a1a1a; }

  .day-btn.active {
    border-color: var(--accent);
    background: #1a1c0a;
  }

  .day-btn.active .day-name { color: var(--accent); }
  .day-btn.rest-day { opacity: 0.35; cursor: default; }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    display: block;
    line-height: 1;
  }

  .day-tag {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-top: 6px;
    line-height: 1.3;
  }

  .day-btn.active .day-tag { color: #a8c020; }

  .day-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    margin: 8px auto 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .day-btn.active .day-dot { opacity: 1; }

  .workout-panel {
    display: none;
    animation: slideIn 0.35s cubic-bezier(0.16,1,0.3,1);
  }

  .workout-panel.visible { display: block; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .panel-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    letter-spacing: 0.03em;
    line-height: 1;
  }

  .panel-focus {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--accent);
    border-radius: 999px;
    white-space: nowrap;
  }

  .exercise-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .exercise-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.2s;
    animation: itemIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }

  .exercise-item:hover {
    border-color: #383838;
    transform: translateY(-2px);
  }

  @keyframes itemIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .exercise-item:nth-child(1) { animation-delay: 0.04s; }
  .exercise-item:nth-child(2) { animation-delay: 0.08s; }
  .exercise-item:nth-child(3) { animation-delay: 0.12s; }
  .exercise-item:nth-child(4) { animation-delay: 0.16s; }
  .exercise-item:nth-child(5) { animation-delay: 0.20s; }
  .exercise-item:nth-child(6) { animation-delay: 0.24s; }
  .exercise-item:nth-child(7) { animation-delay: 0.28s; }

  .ex-img-wrap {
    width: 100%;
    aspect-ratio: 4 / 3;
    background: #111;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ex-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .exercise-item:hover .ex-img-wrap img { transform: scale(1.04); }

  .ex-img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: #2d2d2d;
  }

  .ex-img-placeholder svg { width: 40px; height: 40px; }
  .ex-img-placeholder span { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

  .ex-body {
    padding: 14px 16px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .ex-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #2d2d2d;
    line-height: 1;
    min-width: 24px;
    padding-top: 2px;
  }

  .ex-info { flex: 1; }

  .ex-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .ex-sets-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
  }

  .ex-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
    padding-top: 2px;
  }

  .stats-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .stat-chip span {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--text);
    letter-spacing: 0.03em;
    line-height: 1.1;
  }

  .rest-panel {
    text-align: center;
    padding: 80px 20px;
    border: 1px dashed #222;
    border-radius: 20px;
    animation: slideIn 0.35s ease;
  }

  .rest-emoji { font-size: 56px; margin-bottom: 20px; display: block; }

  .rest-panel h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 0.05em;
    color: #333;
  }

  .rest-panel p { color: var(--muted); font-size: 14px; margin-top: 10px; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 0 50px;
  }

  footer {
    text-align: center;
    padding: 60px 0 40px;
    font-size: 12px;
    color: #2a2a2a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <p class="header-eyebrow">Weekly Program</p>
    <h1>MY<br><span>TRAINING</span><br>WEEK</h1>
    <p class="header-sub">Select a day to view your workout</p>
  </header>

  <div class="days-grid" id="daysGrid"></div>
  <div class="divider"></div>
  <div id="workoutDisplay"></div>

  <footer>Built for the grind &mdash; stay consistent</footer>
</div>

<script>
const B = "https://muscles.wiki/wp-content/uploads/";

const IMG = {
  "Lat Pulldown":              B + "2021/05/Lat-Pulldown.gif",
  "Lever Pronated Row":        B + "2021/05/Seated-Cable-Row.gif",
  "Seated V-Bar Row":          B + "2021/06/Cable-Seated-Row-V-bar.gif",
  "Straight Arm Pulldown":     B + "2021/05/Straight-Arm-Pulldown.gif",
  "Seated DB Curl":            B + "2021/05/Seated-Dumbbell-Curl.gif",
  "Cable Curl":                B + "2021/05/Cable-Curl.gif",
  "Ab Machine Crunch":         B + "2021/05/Abdominal-Crunch-Machine.gif",
  "Incline DB Press":          B + "2021/05/Incline-Dumbbell-Press.gif",
  "Flat Barbell Bench":        B + "2021/05/Barbell-Bench-Press.gif",
  "Chest Press Machine":       B + "2021/05/Chest-Press-Machine.gif",
  "Cable Fly / Pec Deck":      B + "2021/05/Cable-Crossover.gif",
  "DB Lateral Raise":          B + "2021/05/Dumbbell-Lateral-Raise.gif",
  "Tricep Pushdown":           B + "2021/05/Triceps-Pushdown.gif",
  "Overhead Cable Extension":  B + "2021/05/Overhead-Triceps-Extension.gif",
  "Squat (Barbell or Smith)":  B + "2021/05/Barbell-Squat.gif",
  "Deadlift or RDL":           B + "2021/05/Romanian-Deadlift.gif",
  "Leg Press":                 B + "2021/05/Leg-Press.gif",
  "Leg Extension":             B + "2021/05/Leg-Extension.gif",
  "Leg Curl":                  B + "2021/05/Leg-Curl.gif",
  "Calf Raises":               B + "2021/05/Standing-Calf-Raise.gif",
  "Shoulder Press":            B + "2021/05/Shoulder-Press.gif",
  "Rear Delt Machine":         B + "2021/05/Rear-Delt-Fly-Machine.gif",
  "Face Pulls":                B + "2021/05/Face-Pull.gif",
  "Cable Fly":                 B + "2021/05/Cable-Crossover.gif",
  "Pushups":                   B + "2021/05/Push-Ups.gif",
  "Preacher Curl":             B + "2021/05/Preacher-Curl.gif",
  "Hammer Curl":               B + "2021/05/Hammer-Curl.gif",
  "Rope Pushdown":             B + "2021/05/Rope-Pushdown.gif",
};

const workouts = {
  Sunday: {
    focus: "Back, Biceps & Abs",
    exercises: [
      { name: "Lat Pulldown",            sets: "3", reps: "8–10"  },
      { name: "Lever Pronated Row",       sets: "3", reps: "8–10"  },
      { name: "Seated V-Bar Row",         sets: "3", reps: "10–12" },
      { name: "Straight Arm Pulldown",    sets: "3", reps: "12–15" },
      { name: "Seated DB Curl",           sets: "3", reps: "8–10"  },
      { name: "Cable Curl",               sets: "3", reps: "12–15" },
      { name: "Ab Machine Crunch",        sets: "3", reps: "15–20" },
    ]
  },
  Monday: {
    focus: "Chest & Triceps",
    exercises: [
      { name: "Incline DB Press",         sets: "3", reps: "6–8"   },
      { name: "Flat Barbell Bench",       sets: "3", reps: "6–8"   },
      { name: "Chest Press Machine",      sets: "3", reps: "10–12" },
      { name: "Cable Fly / Pec Deck",     sets: "3", reps: "12–15" },
      { name: "DB Lateral Raise",         sets: "3", reps: "15"    },
      { name: "Tricep Pushdown",          sets: "3", reps: "10–12" },
      { name: "Overhead Cable Extension", sets: "3", reps: "12–15" },
    ]
  },
  Tuesday: {
    focus: "Legs, Posterior Chain & Abs",
    exercises: [
      { name: "Squat (Barbell or Smith)", sets: "4", reps: "6–10"  },
      { name: "Deadlift or RDL",          sets: "3", reps: "6–8"   },
      { name: "Leg Press",                sets: "3", reps: "10–12" },
      { name: "Leg Extension",            sets: "3", reps: "12–15" },
      { name: "Leg Curl",                 sets: "3", reps: "12–15" },
      { name: "Calf Raises",              sets: "4", reps: "15–20" },
      { name: "Ab Machine Crunch",        sets: "3", reps: "15–20" },
    ]
  },
  Wednesday: {
    focus: "Shoulders & Rear Delts",
    exercises: [
      { name: "Shoulder Press",           sets: "3", reps: "8–12"  },
      { name: "DB Lateral Raise",         sets: "4", reps: "15–20" },
      { name: "Rear Delt Machine",        sets: "3", reps: "12–15" },
      { name: "Face Pulls",               sets: "3", reps: "15–20" },
    ]
  },
  Thursday: {
    focus: "Chest, Arms & Abs",
    exercises: [
      { name: "Incline DB Press",         sets: "3", reps: "10–12" },
      { name: "Cable Fly",                sets: "3", reps: "15"    },
      { name: "Pushups",                  sets: "2", reps: "Failure"},
      { name: "Preacher Curl",            sets: "3", reps: "12–15" },
      { name: "Hammer Curl",              sets: "2", reps: "10–12" },
      { name: "Rope Pushdown",            sets: "3", reps: "12–15" },
      { name: "Ab Machine Crunch",        sets: "3", reps: "15–20" },
    ]
  },
  Friday:   { rest: true },
  Saturday: { rest: true },
};

const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const short = { Sunday:"SUN", Monday:"MON", Tuesday:"TUE", Wednesday:"WED", Thursday:"THU", Friday:"FRI", Saturday:"SAT" };

const grid = document.getElementById('daysGrid');
const display = document.getElementById('workoutDisplay');

const placeholder = `<div class="ex-img-placeholder">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
    <rect x="3" y="8" width="4" height="8" rx="1"/>
    <rect x="17" y="8" width="4" height="8" rx="1"/>
    <rect x="7" y="10" width="10" height="4" rx="1"/>
  </svg>
  <span>Image unavailable</span>
</div>`;

days.forEach(day => {
  const w = workouts[day];
  const btn = document.createElement('button');
  btn.className = 'day-btn' + (w.rest ? ' rest-day' : '');
  btn.dataset.day = day;
  btn.innerHTML = `
    <span class="day-name">${short[day]}</span>
    <span class="day-tag">${w.rest ? 'Rest' : w.focus.split(' & ')[0]}</span>
    <div class="day-dot"></div>
  `;
  if (!w.rest) btn.addEventListener('click', () => selectDay(day));
  grid.appendChild(btn);
});

function selectDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-day="${day}"]`).classList.add('active');

  const w = workouts[day];

  if (w.rest) {
    display.innerHTML = `
      <div class="rest-panel">
        <span class="rest-emoji">💤</span>
        <h2>Rest Day</h2>
        <p>Recovery is part of the program. Sleep, eat, repeat.</p>
      </div>`;
    return;
  }

  const totalSets = w.exercises.reduce((s, e) => s + parseInt(e.sets), 0);

  display.innerHTML = `
    <div class="workout-panel visible">
      <div class="panel-header">
        <div class="panel-day">${day}</div>
        <div class="panel-focus">${w.focus}</div>
      </div>
      <div class="exercise-list" id="exList"></div>
      <div class="stats-row">
        <div class="stat-chip"><span>${w.exercises.length}</span>Exercises</div>
        <div class="stat-chip"><span>${totalSets}</span>Total Sets</div>
      </div>
    </div>`;

  const list = document.getElementById('exList');

  w.exercises.forEach((ex, i) => {
    const card = document.createElement('div');
    card.className = 'exercise-item';
    card.style.animationDelay = (0.04 + i * 0.04) + 's';

    const imgUrl = IMG[ex.name];
    const imgWrap = document.createElement('div');
    imgWrap.className = 'ex-img-wrap';

    if (imgUrl) {
      const img = document.createElement('img');
      img.src = imgUrl;
      img.alt = ex.name;
      img.loading = 'lazy';
      img.onerror = () => { imgWrap.innerHTML = placeholder; };
      imgWrap.appendChild(img);
    } else {
      imgWrap.innerHTML = placeholder;
    }

    card.appendChild(imgWrap);
    card.innerHTML += `
      <div class="ex-body">
        <span class="ex-number">${String(i+1).padStart(2,'0')}</span>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets-label">${ex.sets} sets</div>
        </div>
        <div class="ex-badge">${ex.sets}&times;${ex.reps}</div>
      </div>`;

    // re-attach the img since innerHTML wipes it
    const body = card.querySelector('.ex-body');
    card.insertBefore(imgWrap, body);
    list.appendChild(card);
  });
}

// Auto-select today or next workout day
const todayIdx = new Date().getDay();
const todayName = days[todayIdx];
if (!workouts[todayName].rest) {
  selectDay(todayName);
} else {
  for (let i = 1; i <= 7; i++) {
    const next = days[(todayIdx + i) % 7];
    if (!workouts[next].rest) { selectDay(next); break; }
  }
}
</script>
</body>
</html>
